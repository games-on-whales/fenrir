<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wolf - PIN</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
            background: rgb(114, 0, 130);
            background: linear-gradient(132deg, rgba(114, 0, 130, 1) 0%, rgba(63, 0, 195, 1) 50%, rgba(0, 71, 255, 1) 100%);
            flex-direction: column; /* Stack items vertically */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .username-container input {
            padding: 1rem;
            font-size: 1.5rem;
            border: none;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            color: #333;
        }

        form.pin-form {
            display: flex;
            justify-content: center;
            color: white;
        }

        .pin-form input {
            margin: 0 0.5rem;
            padding: 0.5rem;
            border: 1px solid white;
            background: transparent;
            color: white;
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 3rem;
            border-radius: 8px;
        }

        /* Chrome, Safari, Edge, Opera */
        .pin-form input::-webkit-outer-spin-button,
        .pin-form input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        .pin-form input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- User inputs their name here -->
    <div class="username-container">
        <input type="text" id="usernameInput" placeholder="Enter Username" autocomplete="off" />
    </div>

    <!-- PIN entry form -->
    <form class="pin-form">
        <input type="number" min="0" max="9" step="1"/>
        <input type="number" min="0" max="9" step="1"/>
        <input type="number" min="0" max="9" step="1"/>
        <input type="number" min="0" max="9" step="1"/>
    </form>
</div>

</body>
<script type="application/javascript">
    const inputs = document.querySelectorAll(".pin-form input");
    const form = document.querySelector(".pin-form");
    const usernameInput = document.getElementById("usernameInput");

    function send(pin) {
        const username = usernameInput.value.trim();
        
        // Ensure they typed a username before submitting
        if (!username) {
            alert("Please enter your username first!");
            // Reset the PIN inputs so they can try again
            inputs.forEach(input => input.value = "");
            usernameInput.focus();
            return;
        }

        let xhr = new XMLHttpRequest();
        // Post to the current URL path to maintain routing compatibility
        xhr.open("POST", window.location.pathname, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                form.textContent = xhr.responseText;
                // Hide the username box upon completion
                document.querySelector('.username-container').style.display = 'none';
            }
        };

        // Include the username in the JSON payload!
        const data = JSON.stringify({
            "pin": pin,
            "secret": window.location.hash.substring(1),
            "username": username
        });
        
        form.textContent = "Sending " + pin + " ...";
        xhr.send(data);
    }

    inputs.forEach((input, key) => {
        input.addEventListener("keyup", function (ev) {
            if (ev.key === "Backspace" && key > 0) {
                inputs[key - 1].focus();
            }
            if (input.value) {
                if (key === 3) {
                    const userCode = [...inputs].map((input) => input.value).join("");
                    send(userCode);
                } else {
                    inputs[key + 1].focus();
                }
            }
        });
    });

    // Start by focusing the username input
    usernameInput.focus();
</script>
</html>
