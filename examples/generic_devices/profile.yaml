---
# yaml-language-server: $schema=https://github.com/games-on-whales/fenrir/raw/refs/heads/main/schemas/direwolf.games-on-whales.github.io/user_v1alpha1.json
apiVersion: direwolf.games-on-whales.github.io/v1alpha1
kind: Profile
metadata:
  name: default
  namespace: direwolf
spec:
  volumes:
    - name: fix-home-perms
      configMap:
        name: fix-home-perms
        defaultMode: 0755
  apps:
  - name: firefox
  pairings:
  - name: ""
  resources:
    limits:
      devic.es/dri: "1"
      cpu: 4000m
      memory: 8G
    requests:
      devic.es/dri: "1"
      cpu: 4000m
      memory: 8G
  sidecarPolicies:
    # We are overriding the default resources for some sidecars for this user.
    wolf:
      # env:
      #   - name: RUST_LOG
      #     value: DEBUG
      # I'm using generic devices to pass along the gpu.
      resources:
        requests:
          devic.es/dri: "1"
          devic.es/uinput: "1"
          cpu: 2
          memory: 2G
        limits:
          devic.es/dri: "1"
          devic.es/uinput: "1"
          cpu: 2
          memory: 2G
      volumeMounts:
        - name: fix-home-perms
          mountPath: /etc/cont-init.d/99-fix-home-perms.sh
          subPath: 99-fix-home-perms.sh
          readOnly: true
