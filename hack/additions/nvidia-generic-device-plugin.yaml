
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-generic-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-generic-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-generic-device-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-generic-device-plugin
    spec:
      priorityClassName: system-node-critical
      containers:
        - image: ghcr.io/squat/generic-device-plugin@sha256:dc192e164c69b03f156765793a1be62ca437709ae477b27ca7d8f3dcf5021576
          args:
            - --device
            - |
              name: gpu
              groups:
                - count: 10
                  paths:
                    - path: /dev/dri/renderD128
#                    - path: /dev/nvidiactl
#                    - path: /dev/nvidia0
#                    - path: /dev/nvidia-uvm
#                    - path: /dev/nvidia-modeset
          name: nvidia-generic-device-plugin
          resources:
            requests:
              cpu: 50m
              memory: 10Mi
          # ports:
          #   - containerPort: 8080
          #     name: http
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
  updateStrategy:
    type: RollingUpdate